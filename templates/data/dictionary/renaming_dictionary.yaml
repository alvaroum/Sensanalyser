# renaming_dictionary.yaml
# Sensanalyser Display Name Mapping
#
# Edit this file to map internal column names and factor levels to the
# display labels you want in tables and figures.
#
# Structure:
#   aliases:     factor_name -> "raw name" -> "canonical name"  (applied at clean time)
#   variables:   column_name -> "Display Label"
#   levels:      factor_name -> level_value -> "Display Label"
#   outcomes:    dv_column_name -> "Display Label"
#
# All mappings are optional. If a name is not listed here, the raw column
# name is used as-is (with underscores replaced by spaces in outputs).
# -----------------------------------------------------------------------

# 1. FACTOR COLUMN NAMES
# Map internal column names to readable headings in tables and figure axes.
variables:
  product:     "Product"
  assessor:    "Assessor"
  user:        "Panelist"
  age:         "Age Group"
  session:     "Session"
  replica:     "Replicate"
  treatment:   "Treatment"
  formulation: "Formulation"

  # Columns split out of "product+factor" names (e.g. "ProductA+Powder 1.0%")
  # get an auto-generated snake_case name like `powder_1_0_percent`. Add an
  # entry here if you want a nicer display label for one, e.g.:
  # powder_1_0_percent: "Powder 1.0%"

# 2. PRODUCT ALIASES  (applied during data cleaning, before any analysis)
# Use this when the same physical product appears under different names across
# QDA sessions. The key is the raw name from the data; the value is the
# canonical name you want to use throughout the analysis.
aliases:
  product:
    # "Alternative name": "Canonical name"

# 3. FACTOR LEVELS
# Map coded values (numbers or abbreviations) to descriptive labels.
levels:
  product:
    "1": "Trial 1"
    "2": "Trial 2"
    "3": "Trial 3"
    "4": "Trial 4"
    "5": "Trial 5"
    "6": "Trial 6"
    "7": "Control"

# 3. DEPENDENT VARIABLE (ATTRIBUTE) NAMES
