# ==========================================================================
# SENSANALYSER PROJECT SETTINGS
# ==========================================================================
#
# This is the ONLY file you need to edit for this project. Delete or comment
# out anything you don't need: every setting shown here is already the
# default, so an empty file runs a sensible analysis.
#
# Check what your project will do before running it:
#   settings_summary("projects/<this project>")
#
# YAML rules: two spaces for indentation (never tabs), and `key: value`.
# --------------------------------------------------------------------------

project:
  name: my_study            # defaults to the folder name


# ─── 1. DATA ──────────────────────────────────────────────────────────────
data:
  # auto = every csv/tsv/xlsx file in this project's data/raw folder.
  files: auto
  # Or list them explicitly (paths relative to the project folder):
  # files:
  #   - data/raw/QDA session 1.xlsx
  #   - data/raw/QDA session 2.xlsx


# ─── 2. VARIABLES ─────────────────────────────────────────────────────────
variables:
  # Sensory attributes to analyse. auto = every numeric column that is not a
  # design column. Or list them: [sweet, sour, bitter]
  attributes: auto

  # Attributes to leave out of the whole analysis (e.g. not measured in every
  # session, or simply not of interest).
  exclude: []

  product: product          # column holding the product / sample name
  panelist: user            # column identifying the assessor (or null)
  extra_factors: []         # other design factors, e.g. [session, replicate]


# ─── 3. MODEL ─────────────────────────────────────────────────────────────
model:
  # one_way_anova, two_way_anova, three_way_anova, one_way_repeated,
  # two_way_repeated, two_way_mixed, three_way_repeated, linear_mixed_model
  type: linear_mixed_model

  random_effects: [assessor]   # for mixed models
  repeated_measures: []        # for repeated-measures ANOVA
  fixed_effects: null          # null = derived from the model type + factors

  alpha: 0.05

  run_anova: false             # classical ANOVA engine
  run_mixed: true              # mixed-model engine

  posthoc:
    run: false
    method: tukey              # tukey, bonferroni, lsd
    focal_terms: null          # null = every significant effect


# ─── 4. OUTLIERS ──────────────────────────────────────────────────────────
outliers:
  detect: true
  apply_policy: true
  # keep_all       - report only, never modify the data
  # remove_extreme - remove only extreme outliers (recommended)
  # remove_all     - remove every identified outlier
  policy: remove_extreme
  # set_na   - blank out the outlying score only
  # drop_row - remove the whole observation
  action: set_na
  grouping_factors: null       # null = the design factors above


# ─── 5. MULTIVARIATE ──────────────────────────────────────────────────────
multivariate:
  pca:
    run: true
    significant_only: false    # true = only attributes with a product effect
  hcpc:
    run: true
    # auto  - Sensanalyser picks the number of clusters
    # click - show the dendrogram and click where to cut it
    # a number (>= 2) - force that many clusters
    clusters: auto
  mfa:
    run: false


# ─── 6. OUTPUTS ───────────────────────────────────────────────────────────
outputs:
  descriptives: true
  tables: true

  # Which figures to save. Every analysis still runs and writes its tables;
  # this only controls the image files.
  #   figures: false     - no figures at all
  #   figures: true      - all of them
  figures:
    spider: true
    pca: true
    hcpc: true
    mfa: true

  report: false                # render the Quarto report
  report_formats: [html, docx]

  table:
    digits: 1
    mean_se: true              # format cells as "mean ± SE"
    letters: true              # add post-hoc letters (needs posthoc.run)

  figure:
    width: 9
    height: 6
    dpi: 300
    palette: Set1              # RColorBrewer palette for spider plots

  spider:
    top_n_attributes: null     # null = all attributes
    significant_only: true
    attributes: null           # null = the analysed attributes
    label_size: null           # null = auto-size axis labels; or a cex number
    legend: auto               # auto = hide for single-group charts; true / false
    colors: {}                 # fixed colour per product (stable across charts):
    # colors:
    #   Control: "#7F7F7F"
    #   Trial 1: "#2CA02C"
    scale_min: 0               # radial axis minimum
    scale_max: null            # null = auto-fit each chart; or a fixed number (e.g. 15)
    axis_labels: value         # value = real scale values / percent = 0-100% / none
    axis_unit: ""              # suffix on the tick labels, e.g. "%" or " cm"
    axis_steps: 4              # number of rings on the axis
    comparisons: {}            # each entry becomes one spider plot:
    # comparisons:
    #   control_vs_trial1: [Control, Trial 1]     # bare list of products
    #   all_products: null                        # null = every product
    #   named_plot:                               # mapping form: overrides
    #     title: "Control vs. Trial 1"
    #     products: [Control, Trial 1]
    #     colors: {Trial 1: "#FF7F00"}            # per-plot colour override
    #     scale_max: 15                           # per-plot scale override
    # See docs/spiderplots.md for the full guide.


# ─── 7. DISPLAY LABELS ────────────────────────────────────────────────────
# How names appear in tables, figures and the report. Anything not listed
# keeps its raw name (with underscores turned into spaces).
labels:
  # Merge product names that mean the same thing (applied while cleaning).
  aliases: {}
  # aliases:
  #   product:
  #     "bread_a": "Bread A"

  variables: {}                # column headings
  # variables:
  #   product: Product
  #   user: Panelist

  levels: {}                   # factor level labels
  # levels:
  #   product:
  #     ctrl: Control

  attributes: {}               # sensory attribute labels
  # attributes:
  #   sweet_a: Sweetness (Aroma)


# ─── 8. DERIVED ATTRIBUTES ────────────────────────────────────────────────
# Combine several attributes into a new one, computed before modelling.
derived:
  enabled: false               # set true to compute the definitions below
  digits: null                 # null = no rounding
  output_label: null           # subfolder for derived-attribute outputs

derived_attributes: {}
# derived_attributes:
#   overall_fruity:
#     label: Overall Fruity
#     method: mean             # row-wise mean, ignoring missing scores
#     min_non_missing: 1       # how many source scores must be present
#     source_variables:
#       - stone_fruits_a
#       - tropical_a


# ─── 9. PRODUCT SUBSETS ───────────────────────────────────────────────────
# Each entry re-runs the whole analysis on part of the products and writes to
# outputs/subsets/<name>/. Use include OR exclude, not both.
subsets: {}
# subsets:
#   without_control:
#     exclude: [Control]
#   treated_only:
#     include: [Treatment A, Treatment B]


# ─── 9b. SCOPE ─────────────────────────────────────────────────────────────
# Which analyses to run:
#   general = the whole dataset only        -> outputs/general/
#   subsets = only the subsets defined above -> outputs/subsets/<name>/
#   both    = the whole dataset AND subsets
# null (default) = "both" when subsets exist, otherwise "general".
scope: null


# ─── 10. ADVANCED ──────────────────────────────────────────────────────────
advanced:
  # true = ask which files/variables to use, with console prompts. On the
  # first run your answers are written back here and this is turned off.
  # Tip: to start a project over from scratch, run reset_project("<project>")
  # instead of editing this by hand - it clears outputs and re-asks everything.
  interactive_setup: false
  # true = print a data overview and stop before analysing
  discover_variables: false
  descriptive_grouping_factors: null
