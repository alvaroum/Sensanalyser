# derived_attributes.yaml
# Project-specific derived variables for the current Sensanalyser dataset.
#
# Raw variables remain untouched in data/raw. These definitions add derived
# conceptual columns to the working dataset before modelling.
#
# Method:
#   mean = row-wise mean across source_variables, ignoring missing values.
#
# Project-specific rules:
# - Overall Fruity excludes Dried Fruits.
# - Saltiness, Woody and Vanilla are excluded from the project-specific rerun.
# - Aroma/flavour pairs are merged where appropriate, except variables already
#   included in Overall Fruity.

derived_attributes:
  overall_fruity:
    label: "Overall Fruity"
    method: mean
    min_non_missing: 1
    source_variables:
      - stone_fruits_a
      - stone_fruits_f
      - tropical_a
      - tropical_f
      - banana_a
      - banana_f
      - orchard_a
      - orchard_f

